---
- name: Ensure etcd backup directory exists
  file:
    path: /var/backups/etcd
    state: directory
    owner: root
    group: root
    mode: '0700'
  become: yes

- name: Generate timestamp for snapshot
  set_fact:
    snapshot_name: "etcd-snapshot-{{ ansible_date_time.date }}-{{ ansible_date_time.time | replace(':','') }}.db"

- name: Run etcd snapshot inside static pod
  shell: |
    kubectl -n kube-system exec etcd-{{ inventory_hostname }} -- \
    sh -c "ETCDCTL_API=3 etcdctl \
    --cacert=/etc/kubernetes/pki/etcd/ca.crt \
    --cert=/etc/kubernetes/pki/etcd/server.crt \
    --key=/etc/kubernetes/pki/etcd/server.key \
    --endpoints=https://127.0.0.1:2379 \
    snapshot save /var/lib/etcd/{{ snapshot_name }}"
  become: yes

- name: Verify snapshot file exists
  stat:
    path: "/var/lib/etcd/{{ snapshot_name }}"
  register: snapshot_stat
  become: yes

- name: Fail if snapshot was not created
  fail:
    msg: "etcd snapshot backup failed"
  when: not snapshot_stat.stat.exists
