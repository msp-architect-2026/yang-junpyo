- name: Add CRI-O repo
  copy:
    dest: /etc/yum.repos.d/crio.repo
    content: |
      [cri-o]
      name=CRI-O
      baseurl=https://pkgs.k8s.io/addons:/cri-o:/stable:/v1.30/rpm/
      enabled=1
      gpgcheck=1
      gpgkey=https://pkgs.k8s.io/addons:/cri-o:/stable:/v1.30/rpm/repodata/repomd.xml.key

- name: Install CRI-O
  dnf:
    name: cri-o
    state: present

- name: Enable and start CRI-O
  systemd:
    name: crio
    enabled: yes
    state: started
