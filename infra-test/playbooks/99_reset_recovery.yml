---
- name: Kubernetes Node Reset & Recovery (Operational Hardened - Fixed Token)
  hosts: k8s_workers
  gather_facts: yes
  vars:
    remote_kubeconfig: /etc/kubernetes/admin.conf

  tasks:

    # 1️⃣ Node 객체 삭제 (Control Plane에서)
    - name: Delete Node object from Control Plane
      kubernetes.core.k8s:
        api_version: v1
        kind: Node
        name: "{{ inventory_hostname }}"
        state: absent
        kubeconfig: "{{ remote_kubeconfig }}"
      delegate_to: k8s-control-1
      ignore_errors: yes

    # 2️⃣ kubelet 정지
    - name: Stop kubelet before reset
      systemd:
        name: kubelet
        state: stopped
      become: yes

    # 3️⃣ kubeadm reset
    - name: Run kubeadm reset
      command: kubeadm reset -f
      become: yes
      when: not ansible_check_mode

    # 4️⃣ CNI & kubelet 데이터 정리
    - name: Remove CNI config
      file:
        path: /etc/cni/net.d
        state: absent
      become: yes

    - name: Remove kubelet data
      file:
        path: /var/lib/kubelet
        state: absent
      become: yes

    # 5️⃣ iptables 정리
    - name: Flush iptables
      shell: |
        iptables -F
        iptables -t nat -F
        iptables -t mangle -F
        iptables -X
      become: yes
      when: not ansible_check_mode

    # 6️⃣ CRI-O / kubelet 재시작
    - name: Restart CRI-O
      systemd:
        name: crio
        state: restarted
      become: yes

    - name: Restart kubelet
      systemd:
        name: kubelet
        state: restarted
      become: yes

    # 7️⃣ Worker 재조인 (운영 고정 토큰 방식)
    - name: Execute kubeadm join (operational fixed token)
      command: >
        kubeadm join 192.168.0.120:6443
        --token bqlim3.5wvfkabr6neee03o
        --discovery-token-ca-cert-hash sha256:caaf273f7120d84e8c2c801f189376f571bbf654b5da109ce485d43346ba0d3f
      become: yes
      when: not ansible_check_mode

    # 8️⃣ Node Ready 상태 확인
    - name: Wait for Node Ready
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Node
        name: "{{ inventory_hostname }}"
        kubeconfig: "{{ remote_kubeconfig }}"
      register: node_info
      until: >
        node_info.resources | length > 0 and
        (
          node_info.resources[0].status.conditions
          | selectattr('type','equalto','Ready')
          | selectattr('status','equalto','True')
          | list | length > 0
        )
      retries: 20
      delay: 10
      delegate_to: k8s-control-1


- name: Service CIDR Healthcheck (Post Reset)
  hosts: k8s_control
  become: yes

  roles:
    - service-cidr-healthcheck
