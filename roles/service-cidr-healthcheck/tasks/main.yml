---

# 1️⃣ 기존 테스트 Pod 정리 (있을 경우)
- name: Cleanup old svc-check pod if exists
  shell: kubectl delete pod svc-check --ignore-not-found=true
  ignore_errors: true
  changed_when: false

# 2️⃣ 테스트 Pod 생성
- name: Create Service CIDR test pod
  shell: |
    kubectl run svc-check \
      --image=curlimages/curl:8.5.0 \
      --restart=Never \
      --command -- sleep 60
  register: pod_create
  changed_when: false

# 3️⃣ Pod Ready 대기
- name: Wait for svc-check pod to be Ready
  shell: kubectl wait --for=condition=Ready pod/svc-check --timeout=40s
  register: pod_ready
  retries: 3
  delay: 5
  until: pod_ready.rc == 0

# 4️⃣ Service CIDR 접근 테스트
- name: Test Service CIDR access from Pod
  shell: |
    kubectl exec svc-check -- curl -k -m 3 https://10.96.0.1:443/readyz
  register: svc_check
  ignore_errors: true

# 5️⃣ 실패 시 kube-proxy 재시작
- name: Restart kube-proxy if Service CIDR unreachable
  shell: kubectl rollout restart daemonset kube-proxy -n kube-system
  when: svc_check.rc != 0

# 6️⃣ 재시작 후 대기
- name: Wait after kube-proxy restart
  pause:
    seconds: 10
  when: svc_check.rc != 0

# 7️⃣ 재검증
- name: Re-test Service CIDR access
  shell: |
    kubectl exec svc-check -- curl -k -m 3 https://10.96.0.1:443/readyz
  register: svc_recheck
  ignore_errors: true
  when: svc_check.rc != 0

# 8️⃣ 2회 실패 시 플레이북 실패 처리
- name: Fail if Service CIDR still unreachable
  fail:
    msg: "Service CIDR unreachable after kube-proxy restart"
  when: svc_check.rc != 0 and svc_recheck.rc != 0

# 9️⃣ 테스트 Pod 정리
- name: Cleanup svc-check pod
  shell: kubectl delete pod svc-check --ignore-not-found=true
  ignore_errors: true
  changed_when: false
