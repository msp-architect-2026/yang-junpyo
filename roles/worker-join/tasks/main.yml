---
- name: Check node Ready status (from control-plane)
  shell: kubectl get node {{ inventory_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "NotJoined"
  delegate_to: k8s-control-1
  register: node_ready_status
  changed_when: false

- name: Debug current node status
  debug:
    msg: "Current node Ready status: {{ node_ready_status.stdout }}"

# 이미 Ready면 아무것도 안 함
- name: Skip join if node already Ready
  meta: end_host
  when: node_ready_status.stdout == "True"

# Ready가 아니면 reset
- name: Reset kubeadm (only if not Ready)
  command: kubeadm reset -f
  become: yes

- name: Clean CNI config (safe cleanup)
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/cni/net.d
    - /var/lib/cni
  become: yes

- name: Restart CRI-O
  systemd:
    name: crio
    state: restarted
    enabled: yes
  become: yes

- name: Restart kubelet
  systemd:
    name: kubelet
    state: restarted
    enabled: yes
  become: yes

# Join 명령 생성 (control-plane에서 1회)
- name: Generate join command on control-plane
  command: kubeadm token create --print-join-command
  delegate_to: k8s-control-1
  run_once: true
  register: join_cmd

# CRI-O 소켓 강제 포함
- name: Join cluster (with CRI-O socket enforced)
  command: "{{ join_cmd.stdout }} --cri-socket=unix:///var/run/crio/crio.sock"
  become: yes

# Node Ready 대기
- name: Wait until node becomes Ready
  shell: kubectl get node {{ inventory_hostname }} -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}'
  delegate_to: k8s-control-1
  register: ready_check
  retries: 20
  delay: 10
  until: ready_check.stdout == "True"
