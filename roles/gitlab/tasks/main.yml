---
# 1️⃣ Docker 설치
- name: Install required packages
  dnf:
    name:
      - dnf-utils
      - device-mapper-persistent-data
      - lvm2
    state: present

- name: Add Docker repository
  shell: dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
  args:
    creates: /etc/yum.repos.d/docker-ce.repo

- name: Install Docker
  dnf:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present

- name: Start and enable Docker
  systemd:
    name: docker
    state: started
    enabled: yes

# 2️⃣ GitLab 디렉토리 생성
- name: Create GitLab directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /srv/gitlab/config
    - /srv/gitlab/logs
    - /srv/gitlab/data

# 3️⃣ GitLab 컨테이너 실행 여부 확인
- name: Check if GitLab container exists
  shell: docker ps -a --filter name=gitlab --format '{% raw %}{{.Names}}{% endraw %}' | grep -w gitlab
  register: gitlab_container
  ignore_errors: true
  changed_when: false

# 4️⃣ GitLab 컨테이너 실행
- name: Run GitLab container
  shell: |
    docker run --detach \
      --hostname {{ gitlab_hostname }} \
      --publish 443:443 --publish 80:80 --publish 2222:22 \
      --name gitlab \
      --restart always \
      --volume /srv/gitlab/config:/etc/gitlab \
      --volume /srv/gitlab/logs:/var/log/gitlab \
      --volume /srv/gitlab/data:/var/opt/gitlab \
      --shm-size 256m \
      gitlab/gitlab-ce:latest
  when: gitlab_container.rc != 0

# 5️⃣ GitLab healthy 상태 대기
- name: Wait for GitLab to be healthy
  shell: docker inspect --format '{% raw %}{{.State.Health.Status}}{% endraw %}' gitlab
  register: gitlab_health
  until: gitlab_health.stdout == "healthy"
  retries: 30
  delay: 10
  changed_when: false

# 6️⃣ 초기 비밀번호 출력
- name: Get GitLab initial root password
  shell: docker exec gitlab grep 'Password:' /etc/gitlab/initial_root_password
  register: gitlab_password
  ignore_errors: true
  changed_when: false

- name: Show GitLab initial root password
  debug:
    msg: "GitLab 초기 비밀번호: {{ gitlab_password.stdout }}"
