- name: Install required packages
  yum:
    name:
      - python3
      - python3-pip
      - python3-setuptools
      - yum-utils
      - device-mapper-persistent-data
      - lvm2
    state: present

- name: Add Docker repository
  get_url:
    url: https://download.docker.com/linux/centos/docker-ce.repo
    dest: /etc/yum.repos.d/docker-ce.repo

- name: Install Docker
  yum:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    state: present

- name: Start Docker
  service:
    name: docker
    state: started
    enabled: yes

- name: Install Docker Python SDK
  pip:
    name: docker==6.1.3

- name: Create GitLab directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /srv/gitlab
    - /srv/gitlab/config
    - /srv/gitlab/logs
    - /srv/gitlab/data

- name: Run GitLab container
  shell: |
    docker rm -f gitlab || true
    docker run -d \
      --hostname gitlab.local \
      --name gitlab \
      --restart always \
      -p 80:80 \
      -p 443:443 \
      -p 2222:22 \
      -p 5050:5050 \
      -v /srv/gitlab/config:/etc/gitlab \
      -v /srv/gitlab/logs:/var/log/gitlab \
      -v /srv/gitlab/data:/var/opt/gitlab \
      gitlab/gitlab-ce:latest
