- name: Set SELinux to permissive (temporary)
  command: setenforce 0
  ignore_errors: yes

- name: Set SELinux to permissive permanently
  lineinfile:
    path: /etc/selinux/config
    regexp: '^SELINUX='
    line: 'SELINUX=permissive'

- name: Disable swap immediately
  command: swapoff -a
  ignore_errors: yes

- name: Disable swap permanently in /etc/fstab
  lineinfile:
    path: /etc/fstab
    regexp: 'swap'
    state: absent

- name: Load kernel modules config
  copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      br_netfilter
      overlay

- name: Apply kernel modules
  shell: |
    modprobe br_netfilter
    modprobe overlay

- name: Set sysctl params for Kubernetes networking
  copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1

- name: Apply sysctl settings
  command: sysctl --system

- name: Set hostname to inventory name
  hostname:
    name: "{{ inventory_hostname }}"

- name: Ensure /etc/hosts has correct hostname mapping
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.0\.1'
    line: "127.0.0.1   localhost {{ inventory_hostname }}"
